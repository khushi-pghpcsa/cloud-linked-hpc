# BeeGFS Storage Service Configuration
# File: /etc/beegfs/beegfs-storage.conf

# =====================================
# Management Configuration
# =====================================

# IP address or hostname of the BeeGFS Management Service
sysMgmtdHost = 10.0.2.20


# =====================================
# Storage Configuration
# =====================================

# Directory used by the storage service to store data chunks
storeStorageDirectory = /data/beegfs/storage


# =====================================
# Authentication Configuration
# =====================================

# Shared authentication file used across all BeeGFS services
connAuthFile = /etc/beegfs/conn.auth


# =====================================
# Network Configuration
# =====================================

# Optional: Define network interfaces
connInterfacesFile =

# Optional: Apply network filtering rules
connNetFilterFile =


# =====================================
# Logging Configuration
# =====================================

# Log verbosity level
# 0 = critical, 1 = errors, 2 = warnings, 3 = info, 4+ = debug
logLevel = 3

# Logging output type
logType = syslog


# =====================================
# Service Behavior and Performance Tuning
# =====================================

# Run service as a background daemon
runDaemonized = true

# Number of worker threads for handling storage operations
tuneNumWorkers = 12
