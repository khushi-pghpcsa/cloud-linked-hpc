# BeeGFS Metadata Service Configuration
# File: /etc/beegfs/beegfs-meta.conf

# =====================================
# Management Configuration
# =====================================

# IP address or hostname of the BeeGFS Management Service
sysMgmtdHost = 10.0.2.20


# =====================================
# Storage Configuration
# =====================================

# Directory used by the metadata service to store metadata
storeMetaDirectory = /data/beegfs/meta


# =====================================
# Authentication Configuration
# =====================================

# Path to shared authentication file used across all BeeGFS nodes
connAuthFile = /etc/beegfs/conn.auth


# =====================================
# Network Configuration
# =====================================

# Optional: Specify network interface configuration file
connInterfacesFile =

# Optional: Define network filtering rules
connNetFilterFile =


# =====================================
# Logging Configuration
# =====================================

# Log verbosity level
# 0 = critical, 1 = errors, 2 = warnings, 3 = info, 4+ = debug
logLevel = 3

# Logging output type
logType = syslog


# =====================================
# Service Behavior
# =====================================

# Run service as a background daemon
runDaemonized = true

# Number of worker threads for metadata processing
tuneNumWorkers = 12
