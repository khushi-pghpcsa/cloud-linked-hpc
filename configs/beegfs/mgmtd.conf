# BeeGFS Management Service Configuration
# File: /etc/beegfs/beegfs-mgmtd.conf

# =====================================
# Storage Configuration
# =====================================

# Directory where the management service stores cluster metadata
storeMgmtdDirectory = /data/beegfs/mgmtd


# =====================================
# Authentication Configuration
# =====================================

# Shared authentication file used across all BeeGFS services
connAuthFile = /etc/beegfs/conn.auth


# =====================================
# Network Configuration
# =====================================

# Optional: Define specific network interfaces
connInterfacesFile =

# Optional: Apply network filtering rules
connNetFilterFile =


# =====================================
# Listener Configuration
# =====================================

# Port on which the management service listens
listenPort = 8008

# RDMA support (disabled in standard setups)
connUseRDMA = false


# =====================================
# Logging Configuration
# =====================================

# Log verbosity level
# 0 = critical, 1 = errors, 2 = warnings, 3 = info, 4+ = debug
logLevel = 3

# Logging output type
logType = syslog


# =====================================
# Service Behavior
# =====================================

# Run service in background as a daemon
runDaemonized = true

# Number of worker threads for handling requests
tuneNumWorkers = 4

# Listener polling interval in seconds
tuneListenerPollIntervalSec = 1


# =====================================
# Quota Management
# =====================================

# Enable or disable quota enforcement
quotaEnableEnforcement = false


# =====================================
# Storage and Migration Settings
# =====================================

# Allow local storage group migration
allowLocalSGMigration = true

# Strategy for selecting storage targets
tuneTargetChooserStrategy = 1

# Preferred storage pool ID for metadata
tuneMetadataPreferredStoragePoolId = 0
